<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WAPOW — Boot Splash</title>
<style>
  html,body{margin:0;height:100%;background:#07090d;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;}
  #wrap{height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;}
  canvas#c{width:min(100vw, calc((100vh - 54px) * 1.70667));background:#0b0618;border-radius:8px;}
  #ui{display:flex;gap:8px;padding:10px;}
  #ui button{background:#161b24;color:#aab4c4;border:1px solid #232b38;border-radius:6px;
    padding:6px 14px;font-size:13px;cursor:pointer;font-family:inherit;}
  #ui button:hover{background:#1e2634;color:#e8edf5;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="1024" height="600"></canvas>
  <div id="ui">
    <button onclick="replay()">Replay</button>
    <button id="fsbtn" onclick="goFull()">Fullscreen</button>
  </div>
</div>
<script>
"use strict";
/* WAPOW boot splash — v4
   Full-res smooth rendering. The road perspective collapses INTO the pole,
   and the dancer is the inverted pose traced from the reference. */

const cv = document.getElementById('c');
const c  = cv.getContext('2d');
const W = 1024, H = 600;
const DUR = 13.5;
let t0 = performance.now();

function replay(){ t0 = performance.now(); }
function goFull(){
  if(document.fullscreenElement){ document.exitFullscreen(); }
  else{ document.getElementById('wrap').requestFullscreen?.(); }
}
document.addEventListener('fullscreenchange', ()=>{
  document.getElementById('fsbtn').textContent =
    document.fullscreenElement ? 'Exit Fullscreen' : 'Fullscreen';
});

const lerp  = (a,b,k)=>a+(b-a)*k;
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
const ease  = p=>p*p*(3-2*p);

const stars = [];
for(let i=0;i<60;i++) stars.push([(i*167)%W, (i*89)%190 + 8]);
const mounts = [[-80,240,88],[120,320,120],[380,280,80],[600,360,136],[860,280,96]];

let dist = 0;
let lastT = 0;

function curveAt(t){
  if(t < 0.9)  return 0;
  if(t < 2.2)  return  Math.sin((t-0.9)/1.3*Math.PI) * 1.0;
  if(t < 3.6)  return -Math.sin((t-2.2)/1.4*Math.PI) * 1.2;
  if(t < 4.6)  return  Math.sin((t-3.6)/1.0*Math.PI) * 0.7;
  return 0;
}

/* ------------------------------ scenery --------------------------------- */
function drawSky(t){
  const g = c.createLinearGradient(0,0,0,240);
  g.addColorStop(0,'#0b0618'); g.addColorStop(0.4,'#1c0c38');
  g.addColorStop(0.75,'#3a1454'); g.addColorStop(1,'#611a66');
  c.fillStyle = g; c.fillRect(0,0,W,240);
  c.fillStyle = '#100a24'; c.fillRect(0,240,W,H-240);
  c.fillStyle = '#e8e4ff';
  stars.forEach(([x,y],i)=>{ if((i + Math.floor(t*3)) % 7) c.fillRect(x,y,2,2); });
  const sy = 152, sr = 104;
  const sg = c.createLinearGradient(0, sy-sr, 0, sy+sr);
  sg.addColorStop(0,'#ffd15c'); sg.addColorStop(0.55,'#ff7a3c'); sg.addColorStop(1,'#ff2e6e');
  c.fillStyle = sg;
  c.beginPath(); c.arc(512, sy, sr, 0, Math.PI*2); c.fill();
  c.fillStyle = '#1c0c38';
  for(let i=0;i<6;i++) c.fillRect(512-sr, sy + 8 + i*16, sr*2, 3 + i*1.2);
}

function drawMountains(curve, hzn){
  if(hzn > H) return;
  c.fillStyle = '#0d0a22';
  const shift = -curve * 40;
  for(const [mx,mw,mh] of mounts){
    const x = mx + shift;
    c.beginPath();
    c.moveTo(x, hzn+4); c.lineTo(x+mw/2, hzn+4-mh); c.lineTo(x+mw, hzn+4);
    c.closePath(); c.fill();
  }
}

/* road with movable horizon + width collapse (the pole transition) */
function drawRoad(curve, hzn, wScale){
  const y0 = Math.max(0, Math.floor(hzn));
  for(let y=y0; y<H; y++){
    const p = (y-hzn)/(H-hzn);
    const z = 1/(p+0.03);
    const band = Math.floor(z*1.4 + dist) % 2;
    if(wScale > 0.9){
      c.fillStyle = band ? '#141b33' : '#0f1427';
      c.fillRect(0, y, W, 1);
    }
    const cx = 512 + curve * 184 * Math.pow(1-p, 2.2);
    const w  = (56 + p*656) * wScale;
    c.fillStyle = band ? '#3a3f4d' : '#2c313d';
    c.fillRect(cx-w/2, y, w, 1);
    const ew = Math.max(1.5, (6 + p*20) * wScale);
    c.fillStyle = band ? '#ff4fa3' : '#c22e78';
    c.fillRect(cx-w/2, y, ew, 1);
    c.fillRect(cx+w/2-ew, y, ew, 1);
    if(band){
      c.fillStyle = '#e6ecf7';
      c.fillRect(cx - Math.max(1, w*0.012), y, Math.max(2, w*0.024), 1);
    }
  }
}

/* ---- the C5 from behind ------------------------------------------------ */
function drawCar(x, y, s, lean, braking){
  c.save();
  c.translate(x, y); c.scale(s, s);
  c.fillStyle = 'rgba(0,0,0,0.45)';
  c.beginPath(); c.ellipse(0, 34, 92, 10, 0, 0, Math.PI*2); c.fill();
  c.fillStyle = '#0d0f18';
  c.fillRect(-84, 8, 30, 28); c.fillRect(54, 8, 30, 28);
  c.fillStyle = '#ff2e6e';
  c.beginPath();
  c.moveTo(-80,-24); c.quadraticCurveTo(-88,-2,-80,24);
  c.lineTo(80,24); c.quadraticCurveTo(88,-2,80,-24);
  c.quadraticCurveTo(0,-34,-80,-24); c.closePath(); c.fill();
  c.fillStyle = '#c21e52'; c.fillRect(-80, 16, 160, 10);
  c.fillStyle = '#1a1e2c';
  c.beginPath();
  c.moveTo(-44+lean,-56); c.quadraticCurveTo(0+lean,-66,44+lean,-56);
  c.lineTo(56,-30); c.lineTo(-56,-30); c.closePath(); c.fill();
  c.fillStyle = '#7fe8ff';
  c.beginPath();
  c.moveTo(-36+lean,-52); c.quadraticCurveTo(0+lean,-60,36+lean,-52);
  c.lineTo(44,-34); c.lineTo(-44,-34); c.closePath(); c.fill();
  c.fillStyle = '#c21e52'; c.fillRect(-68,-30,136,6);
  c.fillStyle = '#14161f'; c.fillRect(-68,-22,136,34);
  const glow = braking ? '#ff5462' : '#e01f3f';
  c.shadowColor = glow; c.shadowBlur = braking ? 22 : 10;
  for(const lx of [-52,-28,28,52]){
    c.fillStyle = glow;
    c.beginPath(); c.arc(lx, -5, 11, 0, Math.PI*2); c.fill();
  }
  c.shadowBlur = 0;
  for(const lx of [-52,-28,28,52]){
    c.fillStyle = braking ? '#ffd0d6' : '#ff8d99';
    c.beginPath(); c.arc(lx-3, -8, 3.5, 0, Math.PI*2); c.fill();
  }
  c.fillStyle = '#232838'; c.fillRect(-14,-14,28,18);
  c.fillStyle = '#8b93a7';
  for(const ex of [-20,-8,4,16]) c.fillRect(ex, 22, 9, 8);
  c.restore();
}

/* ---- pole with sheen + travelling glints -------------------------------- */
function drawPole(topY, botY, t, alpha){
  c.save();
  c.globalAlpha = alpha;
  const g = c.createLinearGradient(505,0,521,0);
  g.addColorStop(0,'#20242e'); g.addColorStop(0.4,'#8a93a8');
  g.addColorStop(0.55,'#f2f6ff'); g.addColorStop(0.7,'#8a93a8'); g.addColorStop(1,'#20242e');
  c.fillStyle = g; c.fillRect(505, topY, 16, botY-topY);
  for(const gy of [topY + ((t*60) % (botY-topY)), topY + ((t*60 + (botY-topY)/2) % (botY-topY))]){
    const p = 0.6 + 0.4*Math.sin(t*5+gy);
    c.fillStyle = `rgba(255,255,255,${0.75*p})`;
    c.fillRect(513-26*p, gy, 52*p, 2);
    c.fillRect(512, gy-14*p, 2, 28*p);
  }
  c.restore();
}

/* ---- the dancer: inverted pose from the reference ----------------------
   coords relative to her hips at the pole; y up = negative */
function limbPath(pts, w, col){
  c.strokeStyle = col; c.lineWidth = w;
  c.lineCap = 'round'; c.lineJoin = 'round';
  c.beginPath();
  c.moveTo(pts[0][0], pts[0][1]);
  for(let i=1;i<pts.length;i++) c.lineTo(pts[i][0], pts[i][1]);
  c.stroke();
}
function ell(x, y, rx, ry, col){
  c.fillStyle = col;
  c.beginPath(); c.ellipse(x, y, rx, ry, 0, 0, Math.PI*2); c.fill();
}
function poly(pts, col){
  c.fillStyle = col;
  c.beginPath();
  c.moveTo(pts[0][0], pts[0][1]);
  for(let i=1;i<pts.length;i++) c.lineTo(pts[i][0], pts[i][1]);
  c.closePath(); c.fill();
}
function drawDancerPass(col, hs){
  /* braced leg up the pole, shoe hooked */
  poly([[-12,-248],[18,-256],[24,-230],[-2,-220]], col);
  limbPath([[8,-218],[28,-110]], 24, col);
  limbPath([[28,-110],[0,0]], 44, col);
  /* extended leg: tall V, pointed toe, stiletto */
  limbPath([[0,0],[88,-80]], 46, col);
  limbPath([[88,-80],[146,-178]], 25, col);
  limbPath([[146,-178],[166,-214]], 11, col);
  poly([[150,-178],[174,-190],[154,-204]], col);
  /* hips at the pole */
  ell(0, 0, 32, 26, col);
  /* torso: horizontal cantilever with a deep arch (belly sags) */
  limbPath([[0,0],[-56,30]], 46, col);
  limbPath([[-56,30],[-110,24]], 41, col);
  limbPath([[-110,24],[-144,6]], 37, col);
  ell(-109, 49, 17, 15, col);                       // bust hangs with gravity
  /* neck + head out at the end */
  limbPath([[-146,8],[-164,14]], 17, col);
  ell(-178, 18, 21, 21, col);
  /* hair hanging straight down, swaying */
  poly([[-194+hs,32],[-206+hs*1.4,72],[-208+hs*1.8,112],[-200+hs*2,140],
        [-186+hs*1.6,106],[-176+hs*1.2,66],[-166+hs*0.6,34]], col);
  /* long grip arm sweeping to the pole below */
  limbPath([[-144,6],[-74,70],[-8,114]], 15, col);
}
function drawDancer(hipY, t){
  const hs = Math.sin(t*1.7) * 8;                   // hair sway
  const rock = Math.sin(t*1.7) * 0.03;              // gentle body rock
  c.save();
  c.translate(512, hipY);
  c.rotate(rock);
  c.save(); c.translate(4, 3);
  drawDancerPass('#ff4fa3', hs);                    // rim light
  c.restore();
  drawDancerPass('#0b0e18', hs);                    // silhouette
  c.restore();
}

function title(txt, x, y, px, color, shadow, glow){
  c.font = `bold ${px}px monospace`;
  c.textAlign = 'center'; c.textBaseline = 'middle';
  if(glow){ c.shadowColor = color; c.shadowBlur = 24; }
  if(shadow){ c.fillStyle = shadow; c.fillText(txt, x+6, y+6); }
  c.fillStyle = color; c.fillText(txt, x, y);
  c.shadowBlur = 0;
}

/* ------------------------------ timeline -------------------------------- */
function draw(t, dt){
  drawSky(t);

  /* perspective collapse: 5.2s..6.8s the horizon dives and the road
     narrows until it IS a vertical column — which the pole fades over */
  const tp = ease(clamp((t-5.2)/1.6, 0, 1));
  const hzn    = lerp(220, 640, tp);
  const wScale = lerp(1, 0.016, tp);

  if(t < 7.2){
    const curve = curveAt(t);
    const speed = lerp(6, 16, clamp(t/4, 0, 1)) * (1 + 3*tp);
    dist += speed * dt;
    drawMountains(curve, hzn);
    drawRoad(curve, hzn, wScale);
    if(t < 4.6){
      drawCar(512 - curve*64, 486, 1.1, Math.round(curve*16), Math.abs(curve) > 0.85);
    } else if(t < 6.0){
      const p = ease(clamp((t-4.6)/1.4, 0, 1));
      drawCar(512, lerp(486, 246, p), lerp(1.1, 0.05, p), 0, false);
    }
  }

  if(tp > 0.4){
    const pa = clamp((tp-0.4)/0.6, 0, 1);
    const floorP = ease(clamp((t-6.2)/0.7, 0, 1));
    c.fillStyle = '#0d0a22';
    c.fillRect(0, H - 96*floorP, W, 96*floorP);
    c.fillStyle = '#ff4fa3';
    c.fillRect(0, H - 96*floorP, W, 3);
    drawPole(lerp(220, 18, pa), H - (96*floorP) + 6, t, pa);
  }

  if(t >= 7.0){
    const p = ease(clamp((t-7.0)/2.2, 0, 1));
    const hipY = lerp(190, 356, p);
    drawDancer(hipY, t);
    for(let i=0;i<10;i++){
      const sx = 512 + Math.sin(t*7+i*2.4)*150;
      const sy = hipY + Math.cos(t*9+i*1.7)*150;
      if((i + Math.floor(t*6)) % 3 === 0){
        c.fillStyle = i%2 ? '#ffd15c' : '#7fe8ff';
        c.fillRect(sx, sy, 4, 4);
      }
    }
  }

  if(t >= 9.3){
    const s = lerp(3.2, 1, ease(clamp((t-9.3)/0.35, 0, 1)));
    c.save();
    c.translate(512, 84); c.scale(s, s); c.translate(-512, -84);
    title('WAPOW', 512, 84, 118, '#ff2e6e', '#37e0c0', true);
    c.restore();
    if(t > 9.9)  title('ADAPTIVE RACING DASH', 512, 158, 42, '#e8e4ff', null, false);
    if(t > 10.3 && Math.floor(t*2)%2) title('PRESS START', 512, 560, 40, '#ffb648', null, true);
  }

  c.fillStyle = 'rgba(0,0,0,0.14)';
  for(let y=0; y<H; y+=3) c.fillRect(0, y, W, 1);
}

/* ------------------------------ main loop ------------------------------- */
function frame(nowMs){
  const t = ((nowMs - t0)/1000) % DUR;
  const dt = Math.min(0.05, Math.max(0.001, t - lastT >= 0 ? t - lastT : 0.016));
  lastT = t;
  c.fillStyle = '#0b0618'; c.fillRect(0,0,W,H);
  draw(t, dt);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
