<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WAPOW — Adaptive Dash Concept</title>
<style>
  html,body{margin:0;height:100%;background:#07090d;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;}
  #wrap{height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;}
  canvas{width:min(100vw, calc((100vh - 54px) * 1.70667));background:#0b0e13;border-radius:10px;}
  #ui{display:flex;gap:8px;padding:10px;}
  #ui button{background:#161b24;color:#aab4c4;border:1px solid #232b38;border-radius:6px;
    padding:6px 14px;font-size:13px;cursor:pointer;font-family:inherit;}
  #ui button:hover{background:#1e2634;color:#e8edf5;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="1024" height="600"></canvas>
  <div id="ui">
    <button onclick="jump(0.5)">Parked</button>
    <button onclick="jump(17)">Cruise</button>
    <button onclick="jump(30)">Canyon</button>
    <button onclick="jump(48)">Track</button>
    <button onclick="jump(50,{oilT:254})">Oil Alert</button>
    <button onclick="multiFail()">Multi Alert</button>
    <button id="fsbtn" onclick="goFull()">Fullscreen</button>
  </div>
</div>
<script>
"use strict";
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
const W = 1024, H = 600;
const DUR = 70;                       // demo loop length, seconds
let t0 = performance.now();
let snapNext = false;                 // demo controls skip the de-escalation dwell
let failUntil = -1;                   // failure-injection window (Multi Alert demo)

function jump(sec, preset){ t0 = performance.now() - sec*1000; if(preset) Object.assign(tel, preset); snapNext = true; }
function multiFail(){ jump(46); failUntil = performance.now()/1000 + 16; }
function goFull(){
  if(document.fullscreenElement){ document.exitFullscreen(); }
  else{ document.getElementById('wrap').requestFullscreen?.(); }
}
document.addEventListener('fullscreenchange', ()=>{
  document.getElementById('fsbtn').textContent =
    document.fullscreenElement ? 'Exit Fullscreen' : 'Fullscreen';
});

const lerp = (a,b,k)=>a+(b-a)*k;
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
const ease = p=>p*p*(3-2*p);

/* ---------------- simulated drive (what real sensors will feed) -------- */
function rawTel(t){
  let rpm=0, spd=0, gx=0, gy=0;
  if(t < 3){        rpm = 0; spd = 0; }        // key on — bulb check
  else if(t < 6){                              // engine start, idle
    rpm = 900 + 700*Math.exp(-(t-3)*2.5); spd = 0;
  } else if(t < 14){                           // pulling away
    const p = ease((t-6)/8);
    spd = 45*p;
    rpm = 900 + 2300*p + 300*Math.sin(t*3)*p;
    gy  = 0.18*p;
  } else if(t < 26){                           // steady cruise
    spd = 63 + 3*Math.sin(t*0.4);
    rpm = 2300 + 150*Math.sin(t*0.7);
    gx  = 0.08*Math.sin(t*0.5);
  } else if(t < 44){                           // canyon road — spirited
    const s = t-26;
    spd = 68 + 16*Math.sin(s*0.5);
    gx  = 0.85*Math.sin(s*0.95)*(0.65+0.35*Math.sin(s*0.23));
    gy  = 0.45*Math.sin(s*0.5+1.2);
    rpm = 4300 + 1800*Math.sin(s*1.25) + 350*Math.sin(s*5);
  } else if(t < 62){                           // track pace
    const s = t-44;
    spd = 86 + 30*Math.sin(s*0.55);
    gx  = 1.12*Math.sin(s*1.05);
    gy  = 0.95*Math.sin(s*0.8+2.1);
    rpm = 5300 + 2050*Math.sin(s*1.55) + 250*Math.sin(s*7);
  } else {                                     // cool-down lap
    const p = ease(clamp((t-62)/6,0,1));
    spd = lerp(90,62,p);
    rpm = lerp(5000,2350,p);
    gx  = 0.5*(1-p)*Math.sin(t*0.9);
  }
  rpm = clamp(rpm, 0, 7600);
  return {rpm, spd, gx, gy};
}

/* smoothed telemetry + slow-moving vitals */
const tel = {rpm:0, spd:0, gx:0, gy:0, coolant:178, oilT:198,
             oilP:0, oilExp:0, oilDev:0, fp:0, fpExp:0, fpDev:0,
             fuel:78, load:0, boost:-12, afr:14.7, eth:63};
function updateTel(t, dt){
  const r = rawTel(t);
  const failing = performance.now()/1000 < failUntil;
  const k = 1 - Math.pow(0.0015, dt);          // frame-rate independent smoothing
  tel.rpm = lerp(tel.rpm, r.rpm, k);
  tel.spd = lerp(tel.spd, r.spd, k);
  tel.gx  = lerp(tel.gx,  r.gx,  k*1.6 > 1 ? 1 : k*1.6);
  tel.gy  = lerp(tel.gy,  r.gy,  k*1.6 > 1 ? 1 : k*1.6);
  const load = tel.rpm < 900 ? 0 : clamp((tel.rpm-1200)/6400, 0, 1);
  tel.load = load;
  tel.coolant = lerp(tel.coolant, 182 + 22*load, dt*0.05);
  /* oil temp: sustained track pace (or injected failure) overheats the oil */
  let heat = 0;
  if(t >= 48 && t < 62) heat = 45*ease(clamp((t-48)/9,0,1));
  else if(t >= 62)      heat = 45*(1-ease(clamp((t-62)/6,0,1)));
  if(failing) heat = 85;
  tel.oilT = lerp(tel.oilT, 200 + 42*load + heat, dt*0.12);
  /* oil pressure NORMALLY rises and falls with rpm — that movement is noise.
     Track deviation from expected-at-this-rpm; react only when it leaves
     the normal band. (Ty's rule: unnecessary movement is a distraction.) */
  const opTgt = tel.rpm<200 ? 0 : (24 + 48*load) * (failing ? 0.62 : 1);
  tel.oilP   = lerp(tel.oilP, opTgt, k);
  tel.oilExp = tel.rpm<200 ? 0 : 24 + 48*load;
  tel.oilDev = lerp(tel.oilDev, tel.oilP - tel.oilExp, 1-Math.pow(0.3,dt));
  /* vac/boost follows load: deep vacuum at cruise, boost under load */
  const bTgt = tel.rpm < 400 ? 0 : -13 + 33*ease(clamp((load-0.15)/0.75, 0, 1));
  tel.boost = lerp(tel.boost, bTgt, k);
  /* fuel pressure: manifold-referenced regulator → base 43 psi + boost.
     Same sentinel treatment as oil pressure: deviation is what matters. */
  tel.fpExp = tel.rpm < 400 ? 0 : 43 + Math.max(0, tel.boost);
  tel.fp    = lerp(tel.fp, tel.fpExp, k);
  tel.fpDev = lerp(tel.fpDev, tel.fp - tel.fpExp, 1-Math.pow(0.3,dt));
  /* AFR: stoich in closed loop, rich under boost — lean under load if failing */
  const aTgt = load > 0.5 ? (failing ? 13.9 : 11.4 + 0.3*Math.sin(t*3))
                          : 14.7 + 0.12*Math.sin(t*1.7);
  tel.afr  = lerp(tel.afr, aTgt, 1-Math.pow(0.05,dt));
  tel.eth  = 63;
  tel.fuel = 78 - (t/DUR)*6;
}

/* ------------- mode detection (same logic the real dash will run) ------ */
let gEnv = 0;
let mode = 'PARKED';
let calm = 0;
const RANK  = {PARKED:0, CRUISING:1, SPIRITED:2, RACING:3};
const ORDER = ['PARKED','CRUISING','SPIRITED','RACING'];
function detectMode(dt, force){
  const g = Math.hypot(tel.gx, tel.gy);
  gEnv = Math.max(gEnv * Math.pow(0.72, dt), g);
  let target;
  if(tel.spd < 3 && tel.rpm < 1200)      target = 'PARKED';
  else if(gEnv > 0.95 || tel.rpm > 6600) target = 'RACING';
  else if(gEnv > 0.50 || tel.rpm > 4300) target = 'SPIRITED';
  else                                   target = 'CRUISING';
  if(force){ mode = target; calm = 0; return; }
  if(RANK[target] > RANK[mode]){ mode = target; calm = 0; }
  else if(RANK[target] < RANK[mode]){
    calm += dt;
    if(calm > 6){ mode = ORDER[RANK[mode]-1]; calm = 0; }
  } else { calm = 0; }
}
const MODE_COLOR = {PARKED:'#8b93a7', CRUISING:'#4aa8ff', SPIRITED:'#ffb648', RACING:'#ff5462'};

/* ---- alerts: multiple vitals can go critical at once; each has
       hysteresis, a severity order, and seizes a main-view slot -------- */
const ALERTS = [   // ordered by severity — first = most critical
  {id:'OILP',  label:'OIL PRESS',  w:'oilP',  on:()=>tel.oilDev < -12,               off:()=>tel.oilDev > -8},
  {id:'FUELP', label:'FUEL PRESS', w:'fuelP', on:()=>tel.fpDev  < -8,                off:()=>tel.fpDev  > -5},
  {id:'OILT',  label:'OIL TEMP',   w:'oilT',  on:()=>tel.oilT  >= 260,               off:()=>tel.oilT  <= 250},
  {id:'AFR',   label:'AFR LEAN',   w:'afr',   on:()=>tel.load > 0.55 && tel.afr > 13.2, off:()=>tel.afr < 12.9 || tel.load < 0.5},
];
const alertOn = {};
function updateAlerts(){
  for(const a of ALERTS){
    if(!alertOn[a.id] && a.on())      alertOn[a.id] = true;
    else if(alertOn[a.id] && a.off()) alertOn[a.id] = false;
  }
}
const activeAlerts = () => ALERTS.filter(a => alertOn[a.id]);

/* main-view slots by number of simultaneous alerts (max 3 promoted) */
const SLOTS = {
  1: [{x:395,y:125,w:300,h:300}],
  2: [{x:340,y:140,w:255,h:255},{x:615,y:140,w:255,h:255}],
  3: [{x:335,y:135,w:225,h:225},{x:575,y:135,w:225,h:225},{x:455,y:370,w:190,h:190}],
};
/* when any alert is active, non-critical info gets out of the way */
const ALERT_BASE = {
  speed:  {x:75,  y:410, w:150, h:85,  a:0.85},
  gcircle:{x:30,  y:150, w:240, h:240, a:0.5},
  boost:  {x:880, y:125, w:120, h:120, a:0.65},
  oilT:   {x:885, y:265, w:110, h:110, a:0.75},
  coolant:{x:880, y:265, w:110, h:110, a:0},
  eth:    {x:255, y:548, w:90,  h:26,  a:0},
  fuel:   {x:60,  y:550, w:180, h:22,  a:0.3},
};

/* ---- knock: instant indicator + persistent tappable log --------------- */
let knockEvt = {t:-99, rpm:0, load:0};
const knockLog = [];                  // newest first
let knockSeen = 0;                    // how many the driver has viewed
let logOpen = false;

/* ------------- adaptive layout: each mode ranks the widgets ------------ */
/* sentinels (oilP, fuelP, afr) hold a FIXED home row bottom-right and only
   enter the main view when their reading leaves expected operation */
const SENT = {
  oilP: {x:700, y:468, w:102, h:102},
  afr:  {x:812, y:468, w:102, h:102},
  fuelP:{x:920, y:468, w:98,  h:98 },
};
function sentRow(a){ return {
  oilP: {...SENT.oilP, a}, afr: {...SENT.afr, a}, fuelP: {...SENT.fuelP, a},
};}
const LAYOUTS = {
  PARKED: {
    rpm:    {x:32,  y:20,  w:960, h:18,  a:0.18},
    speed:  {x:312, y:150, w:400, h:260, a:0},
    gcircle:{x:60,  y:130, w:300, h:300, a:0},
    fuel:   {x:120, y:250, w:380, h:70,  a:1},
    eth:    {x:120, y:345, w:130, h:44,  a:0.9},
    coolant:{x:560, y:160, w:190, h:190, a:1},
    oilT:   {x:780, y:160, w:190, h:190, a:1},
    boost:  {x:300, y:400, w:140, h:140, a:0},
    ...sentRow(0.45),
  },
  CRUISING: {
    rpm:    {x:32,  y:20,  w:960, h:26,  a:0.45},
    speed:  {x:312, y:130, w:400, h:280, a:1},
    gcircle:{x:60,  y:180, w:220, h:220, a:0},
    fuel:   {x:60,  y:490, w:280, h:46,  a:0.8},
    eth:    {x:60,  y:430, w:110, h:40,  a:0.45},
    coolant:{x:530, y:425, w:130, h:130, a:0.7},
    oilT:   {x:865, y:130, w:120, h:120, a:0.35},
    boost:  {x:120, y:210, w:155, h:155, a:0.55},
    ...sentRow(0.35),
  },
  SPIRITED: {
    rpm:    {x:32,  y:16,  w:960, h:56,  a:0.95},
    gcircle:{x:50,  y:140, w:280, h:280, a:1},
    speed:  {x:400, y:150, w:280, h:170, a:0.9},
    boost:  {x:755, y:120, w:170, h:170, a:1},
    oilT:   {x:770, y:310, w:140, h:140, a:0.9},
    coolant:{x:565, y:350, w:115, h:115, a:0.6},
    fuel:   {x:60,  y:508, w:240, h:32,  a:0.4},
    eth:    {x:315, y:505, w:100, h:36,  a:0.5},
    ...sentRow(0.5),
  },
  RACING: {
    rpm:    {x:16,  y:10,  w:992, h:88,  a:1},
    gcircle:{x:30,  y:150, w:290, h:290, a:1},
    boost:  {x:345, y:130, w:190, h:190, a:1},
    coolant:{x:565, y:140, w:130, h:130, a:0.6},
    oilT:   {x:720, y:130, w:170, h:170, a:0.9},
    speed:  {x:430, y:370, w:190, h:110, a:0.85},
    fuel:   {x:60,  y:550, w:180, h:22,  a:0.25},
    eth:    {x:255, y:548, w:90,  h:26,  a:0.3},
    ...sentRow(0.55),
  },
};
/* current (animated) geometry for every widget */
const cur = {};
for(const w in LAYOUTS.PARKED) cur[w] = {...LAYOUTS.PARKED[w]};
function updateLayout(dt){
  const k = 1 - Math.pow(0.03, dt);
  const act = activeAlerts();
  let tgt;
  if(act.length){
    tgt = {...LAYOUTS[mode], ...ALERT_BASE};
    const n = Math.min(act.length, 3);
    const slots = SLOTS[n];
    act.slice(0,3).forEach((al,i)=>{ tgt[al.w] = {...slots[i], a:1}; });
  } else {
    tgt = LAYOUTS[mode];
  }
  for(const w in cur)
    for(const p of ['x','y','w','h','a'])
      cur[w][p] = lerp(cur[w][p], tgt[w][p], k);
}

/* ------------------------------ drawing -------------------------------- */
function rrect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

function drawRpm(r, now){
  const max = 8000, redline = 7000, val = tel.rpm;
  ctx.globalAlpha = r.a;
  ctx.fillStyle = '#131926'; rrect(r.x,r.y,r.w,r.h,6); ctx.fill();
  const frac = clamp(val/max,0,1);
  let col = '#37e0c0';
  if(val > redline) col = '#ff5462'; else if(val > 5600) col = '#ffb648';
  ctx.fillStyle = col; rrect(r.x+2, r.y+2, Math.max(4,(r.w-4)*frac), r.h-4, 4); ctx.fill();
  ctx.fillStyle = 'rgba(255,84,98,0.25)';
  ctx.fillRect(r.x + r.w*(redline/max), r.y, r.w*(1-redline/max), r.h);
  ctx.fillStyle = 'rgba(255,255,255,0.28)';
  for(let i=1;i<8;i++){ const tx = r.x + r.w*(i*1000/max); ctx.fillRect(tx, r.y, 1.5, r.h); }
  if(r.h > 34){
    ctx.fillStyle = '#e8edf5'; ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.font = `700 ${Math.min(26,r.h*0.5)}px 'Segoe UI'`;
    ctx.fillText(Math.round(val) + ' RPM', r.x+12, r.y+r.h/2+1);
  }
  if(val > 6500 && Math.floor(now*8)%2===0){
    ctx.strokeStyle='#ffffff'; ctx.lineWidth=3; rrect(r.x,r.y,r.w,r.h,6); ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawSpeed(r){
  if(r.a < 0.02) return;
  ctx.globalAlpha = r.a; ctx.textAlign='center';
  ctx.fillStyle = '#eef2f8'; ctx.textBaseline='middle';
  ctx.font = `700 ${r.h*0.72}px 'Segoe UI'`;
  ctx.fillText(Math.round(tel.spd), r.x+r.w/2, r.y+r.h*0.45);
  ctx.fillStyle = '#6b7688';
  ctx.font = `600 ${Math.max(13,r.h*0.13)}px 'Segoe UI'`;
  ctx.fillText('MPH', r.x+r.w/2, r.y+r.h*0.9);
  ctx.globalAlpha = 1;
}

const trail = [];
function drawG(r){
  if(r.a < 0.02) return;
  ctx.globalAlpha = r.a;
  const cx=r.x+r.w/2, cy=r.y+r.h/2, rad=Math.min(r.w,r.h)/2-8, maxG=1.4;
  ctx.strokeStyle='rgba(255,255,255,0.14)'; ctx.lineWidth=1.5;
  for(const g of [0.5,1.0]){
    ctx.beginPath(); ctx.arc(cx,cy,rad*g/maxG,0,Math.PI*2); ctx.stroke();
  }
  ctx.beginPath(); ctx.arc(cx,cy,rad,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,0.10)';
  ctx.beginPath(); ctx.moveTo(cx-rad,cy); ctx.lineTo(cx+rad,cy);
  ctx.moveTo(cx,cy-rad); ctx.lineTo(cx,cy+rad); ctx.stroke();
  for(let i=0;i<trail.length;i++){
    const p = trail[i], f = i/trail.length;
    ctx.fillStyle = `rgba(55,224,192,${f*0.5*r.a})`;
    ctx.beginPath();
    ctx.arc(cx + p[0]/maxG*rad, cy + p[1]/maxG*rad, 3+f*2, 0, Math.PI*2); ctx.fill();
  }
  ctx.fillStyle = '#37e0c0';
  ctx.beginPath();
  ctx.arc(cx + tel.gx/maxG*rad, cy + tel.gy/maxG*rad, 7, 0, Math.PI*2); ctx.fill();
  const g = Math.hypot(tel.gx,tel.gy);
  ctx.fillStyle='#aab4c4'; ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.font = `600 ${Math.max(13,rad*0.16)}px 'Segoe UI'`;
  ctx.fillText(g.toFixed(2)+' g', cx, r.y+r.h-2);
  ctx.globalAlpha = 1;
}

function drawGauge(r, val, lo, hi, warn, label, unit, now, opts){
  if(r.a < 0.02) return;
  ctx.globalAlpha = r.a;
  const cx=r.x+r.w/2, cy=r.y+r.h/2, rad=Math.min(r.w,r.h)/2-6;
  const a0 = Math.PI*0.75, a1 = Math.PI*2.25;
  const step = (opts && opts.step) || 1;
  const dec  = (opts && opts.dec) || 0;
  const frac = (opts && opts.frac !== undefined) ? clamp(opts.frac,0,1) : clamp((val-lo)/(hi-lo),0,1);
  const hot  = (opts && opts.hot  !== undefined) ? opts.hot : val >= warn;
  if(hot){
    ctx.strokeStyle = `rgba(255,84,98,${0.30+0.30*Math.sin(now*7)})`;
    ctx.lineWidth = Math.max(3, rad*0.09);
    ctx.beginPath(); ctx.arc(cx,cy,rad*1.14,0,Math.PI*2); ctx.stroke();
  }
  ctx.lineWidth = Math.max(5, rad*0.14); ctx.lineCap='round';
  ctx.strokeStyle = '#1a2130';
  ctx.beginPath(); ctx.arc(cx,cy,rad,a0,a1); ctx.stroke();
  ctx.strokeStyle = hot ? '#ff5462' : '#37e0c0';
  ctx.beginPath(); ctx.arc(cx,cy,rad,a0,a0+(a1-a0)*frac); ctx.stroke();
  ctx.fillStyle = hot ? '#ff8d99' : '#eef2f8';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font = `700 ${rad*0.42}px 'Segoe UI'`;
  ctx.fillText((Math.round(val/step)*step).toFixed(dec), cx, cy - rad*0.05);
  ctx.fillStyle = hot ? '#ff5462' : '#6b7688';
  ctx.font = `600 ${Math.max(11,rad*0.17)}px 'Segoe UI'`;
  ctx.fillText(unit, cx, cy + rad*0.32);
  ctx.fillText(label, cx, cy + rad*0.78);
  ctx.globalAlpha = 1;
}

function drawFuel(r){
  if(r.a < 0.02) return;
  ctx.globalAlpha = r.a;
  ctx.fillStyle='#131926'; rrect(r.x,r.y,r.w,r.h,r.h/3); ctx.fill();
  const frac = tel.fuel/100;
  ctx.fillStyle = frac < 0.15 ? '#ff5462' : '#4aa8ff';
  rrect(r.x+3, r.y+3, (r.w-6)*frac, r.h-6, (r.h-6)/3); ctx.fill();
  ctx.fillStyle='#aab4c4'; ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.font=`600 ${Math.max(12,r.h*0.42)}px 'Segoe UI'`;
  ctx.fillText('FUEL '+Math.round(tel.fuel)+'%', r.x+10, r.y+r.h/2+1);
  ctx.globalAlpha = 1;
}

function drawEth(r){
  if(r.a < 0.02) return;
  ctx.globalAlpha = r.a;
  ctx.fillStyle='#131926'; ctx.strokeStyle='#232b38'; ctx.lineWidth=1.5;
  rrect(r.x,r.y,r.w,r.h,8); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#c9a5ff'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font=`700 ${r.h*0.5}px 'Segoe UI'`;
  ctx.fillText('E'+Math.round(tel.eth), r.x+r.w*0.35, r.y+r.h/2+1);
  ctx.fillStyle='#6b7688';
  ctx.font=`600 ${Math.max(10,r.h*0.28)}px 'Segoe UI'`;
  ctx.fillText('ETH', r.x+r.w*0.78, r.y+r.h/2+1);
  ctx.globalAlpha = 1;
}

/* ---- fixed indicator row: these NEVER move (glanceable by habit) ------ */
function indChip(x, y, w, label, on, col){
  ctx.fillStyle = on ? col+'33' : '#10141d';
  ctx.strokeStyle = on ? col : '#1c2330'; ctx.lineWidth = 1.5;
  rrect(x, y, w, 28, 14); ctx.fill(); ctx.stroke();
  ctx.fillStyle = on ? col : '#39424f';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font = "700 13px 'Segoe UI'";
  ctx.fillText(label, x+w/2, y+15);
}
function arrow(x, y, dir, on){
  ctx.fillStyle = on ? '#3ddc68' : '#1c2330';
  ctx.beginPath();
  if(dir<0){ ctx.moveTo(x,y+9); ctx.lineTo(x+16,y);  ctx.lineTo(x+16,y+18); }
  else     { ctx.moveTo(x+16,y+9); ctx.lineTo(x,y);  ctx.lineTo(x,y+18); }
  ctx.closePath(); ctx.fill();
}
function drawIndicators(t, now){
  const y = cur.rpm.y + cur.rpm.h + 12;
  const bulb  = t > 3 && t < 4.6;
  const blink = Math.floor(now*2.8)%2===0;
  const sigL  = (t > 7 && t < 12) || bulb;
  const sigR  = (t > 63 && t < 67) || bulb;
  arrow(24, y+5, -1, sigL && blink);
  arrow(52, y+5,  1, sigR && blink);
  indChip(84,  y, 56, 'CEL',  bulb, '#ffb648');
  const rec = RANK[mode] >= 2 || bulb;
  indChip(148, y, 60, (rec && Math.floor(now*1.5)%2===0) ? '● LOG' : 'LOG', rec, '#ff5462');
  const kAge = now - knockEvt.t;
  const kLit = kAge < 1.0 || bulb;
  indChip(216, y, 74, 'KNOCK', kLit, '#ffb648');
  /* unread-events badge: there's something in the log worth seeing */
  const unread = knockLog.length - knockSeen;
  if(unread > 0 && !bulb){
    ctx.fillStyle = '#ff5462';
    ctx.beginPath(); ctx.arc(288, y+2, 9, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font = "700 11px 'Segoe UI'";
    ctx.fillText(unread > 9 ? '9+' : String(unread), 288, y+3);
  }
  if(kAge < 6 && !bulb){
    ctx.fillStyle = 'rgba(255,182,72,0.9)';
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.font = "600 13px 'Segoe UI'";
    ctx.fillText(Math.round(knockEvt.rpm).toLocaleString()+' rpm · '
                 +Math.round(knockEvt.load*100)+'% load', 302, y+15);
  }
}

/* ---- knock log panel: tap KNOCK chip to open, tap anywhere to close --- */
function fmtTime(s){
  const m = Math.floor(s/60), ss = Math.floor(s%60);
  return m+':'+String(ss).padStart(2,'0');
}
function drawKnockLog(){
  if(!logOpen) return;
  ctx.fillStyle = 'rgba(5,7,10,0.78)'; ctx.fillRect(0,0,W,H);
  const px=262, py=80, pw=500, ph=440;
  ctx.fillStyle = '#10141d'; ctx.strokeStyle='#ffb648'; ctx.lineWidth=2;
  rrect(px,py,pw,ph,14); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#ffb648'; ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.font = "700 20px 'Segoe UI'";
  ctx.fillText('KNOCK LOG', px+24, py+34);
  ctx.fillStyle = '#6b7688'; ctx.font = "600 13px 'Segoe UI'";
  ctx.textAlign='right';
  ctx.fillText(knockLog.length+' event'+(knockLog.length===1?'':'s'), px+pw-24, py+34);
  ctx.textAlign='left';
  ctx.fillText('TIME', px+24, py+68);
  ctx.fillText('RPM',  px+170, py+68);
  ctx.fillText('LOAD', px+320, py+68);
  ctx.strokeStyle='#232b38'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(px+20,py+82); ctx.lineTo(px+pw-20,py+82); ctx.stroke();
  const rows = knockLog.slice(0,10);
  ctx.font = "600 15px 'Segoe UI'";
  rows.forEach((ev,i)=>{
    const ry = py + 106 + i*30;
    ctx.fillStyle = i < (knockLog.length - knockSeen) ? '#ffd9a1' : '#8b93a7';
    ctx.fillText(fmtTime(ev.s),                    px+24,  ry);
    ctx.fillText(Math.round(ev.rpm).toLocaleString(), px+170, ry);
    ctx.fillText(Math.round(ev.load*100)+'%',      px+320, ry);
  });
  if(!rows.length){
    ctx.fillStyle='#6b7688';
    ctx.fillText('No knock events this session.', px+24, py+110);
  }
  ctx.fillStyle = '#6b7688'; ctx.textAlign='center'; ctx.font = "600 13px 'Segoe UI'";
  ctx.fillText('tap anywhere to close', px+pw/2, py+ph-22);
}

/* tap handling: KNOCK chip opens the log, any tap closes it */
cv.addEventListener('pointerdown', e=>{
  const x = e.offsetX * (W/cv.clientWidth);
  const y = e.offsetY * (H/cv.clientHeight);
  if(logOpen){ logOpen = false; knockSeen = knockLog.length; return; }
  const iy = cur.rpm.y + cur.rpm.h + 12;
  if(x >= 216 && x <= 298 && y >= iy-6 && y <= iy+34) logOpen = true;
});

function drawChrome(now){
  const y = cur.rpm.y + cur.rpm.h + 12;
  const col = MODE_COLOR[mode];
  ctx.fillStyle = col + '22';
  ctx.strokeStyle = col; ctx.lineWidth = 1.5;
  rrect(866, y, 136, 32, 16); ctx.fill(); ctx.stroke();
  ctx.fillStyle = col; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font = "700 15px 'Segoe UI'";
  ctx.fillText(mode, 934, y+17);
  /* one banner per active alert, stacking leftward from the mode chip */
  const act = activeAlerts();
  act.forEach((al,i)=>{
    const bx = 866 - (i+1)*158;
    const pulse = 0.5+0.5*Math.sin(now*7 + i);
    ctx.fillStyle = `rgba(255,84,98,${0.12+0.25*pulse})`;
    ctx.strokeStyle = '#ff5462'; ctx.lineWidth = 1.5;
    rrect(bx, y, 148, 32, 16); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#ff8d99'; ctx.textAlign='center';
    ctx.font = "700 13px 'Segoe UI'";
    ctx.fillText('⚠ '+al.label, bx+74, y+17);
  });
  ctx.fillStyle = 'rgba(170,180,196,0.4)'; ctx.textAlign='left';
  ctx.font = "600 12px 'Segoe UI'";
  ctx.fillText('WAPOW · adaptive display concept', 20, 588);
}

/* ------------------------------ main loop ------------------------------ */
let last = performance.now(), trailTick = 0, lastT = 0;
function frame(nowMs){
  const dt = Math.min(0.1,(nowMs-last)/1000); last = nowMs;
  const t = ((nowMs - t0)/1000) % DUR;
  const wrapped = t < lastT; lastT = t;
  updateTel(t, dt);
  detectMode(dt, wrapped || snapNext); snapNext = false;
  updateAlerts();
  updateLayout(dt);

  const now = nowMs/1000;
  /* simulated knock: rare events at high load, tagged with rpm + load */
  const failing = now < failUntil;
  if(mode === 'RACING' && tel.load > 0.6 && Math.random() < dt*(failing ? 0.3 : 0.09)){
    knockEvt = {t: now, rpm: tel.rpm, load: tel.load};
    knockLog.unshift({s: now, rpm: tel.rpm, load: tel.load});
    if(knockLog.length > 20) knockLog.pop();
  }

  trailTick += dt;
  if(trailTick > 0.06){ trailTick = 0; trail.push([tel.gx, tel.gy]); if(trail.length>42) trail.shift(); }

  ctx.clearRect(0,0,W,H);
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#0d1119'); bg.addColorStop(1,'#0a0d13');
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);

  drawRpm(cur.rpm, now);
  drawG(cur.gcircle);
  drawSpeed(cur.speed);
  drawGauge(cur.coolant, tel.coolant, 120, 260, 230, 'WATER', '°F', now);
  drawGauge(cur.oilT,    tel.oilT,    140, 300, 260, 'OIL TEMP', '°F', now);
  drawGauge(cur.oilP, tel.oilP, 0, 100, 999, 'OIL PRESS', 'PSI', now,
            {frac: clamp(0.5 + tel.oilDev/40, 0, 1),
             hot:  tel.oilDev < -12,
             step: 5});
  drawGauge(cur.fuelP, tel.fp, 0, 90, 999, 'FUEL PRESS', 'PSI', now,
            {frac: clamp(0.5 + tel.fpDev/30, 0, 1),
             hot:  tel.fpDev < -8,
             step: 1});
  drawGauge(cur.boost, tel.boost, -15, 22, 999, 'BOOST', 'PSI', now,
            {step: 0.5, dec: 1, hot: tel.boost > 20});
  drawGauge(cur.afr, tel.afr, 10, 18, 999, 'AFR', 'A/F', now,
            {step: 0.1, dec: 1,
             hot: tel.load > 0.55 && tel.afr > 13.2});
  drawFuel(cur.fuel);
  drawEth(cur.eth);
  drawIndicators(t, now);
  drawChrome(now);
  drawKnockLog();

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
